# 鏍囩鎺ㄩ€佹椂鏋勫缓 Tauri v2 妗岄潰搴旂敤骞跺彂甯?GitHub Release
# 娉ㄦ剰锛歐indows runner 鑷甫 Rust + WebView2锛屾棤闇€棰濆瀹夎

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: rustup update stable && rustup default stable

      - run: npm install -g @tauri-apps/cli@^2

      - run: npx tauri build
        env:
          # CLARIFICATION: 绛惧悕瀵嗛挜涓哄彲閫夌幆澧冨彉閲忋€傚鏋滀粨搴?Secrets 涓湭閰嶇疆鍒欎笉璁剧疆锛屾瀯寤虹粨鏋滀笉绛惧悕銆?          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
